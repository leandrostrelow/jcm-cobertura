<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JCM | Ficha de Cobertura</title>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">JCM</div>
        <div>
          <p>Central de cobertura</p>
          <h1>Jogos Capixaba de Medicina</h1>
        </div>
      </div>
      <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1bCQtDZ-3QunThSAsmB2Tn3WIqjYycgneT0B8PhxnE78/edit" target="_blank" rel="noreferrer">
        <i data-lucide="table-2"></i>
        <span>Planilha base</span>
      </a>
      <div id="syncStatus" class="sync-status">Conectando...</div>
    </header>

    <main class="app-shell">
      <section class="picker" aria-label="Selecionar partida">
        <label>
          <span>Data</span>
          <select id="dateFilter"></select>
        </label>
        <label class="wide">
          <span>Partida / evento</span>
          <select id="gamePicker"></select>
        </label>
        <div class="picker-actions" aria-label="Navegar entre partidas">
          <button id="prevGame" class="secondary-button" type="button">
            <i data-lucide="chevron-left"></i>
            <span>Anterior</span>
          </button>
          <button id="nextGame" class="secondary-button" type="button">
            <span>Próximo</span>
            <i data-lucide="chevron-right"></i>
          </button>
        </div>
      </section>

      <section id="matchCard" class="match-card" aria-live="polite"></section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="storyModal" class="story-modal" hidden>
      <div class="story-dialog" role="dialog" aria-modal="true" aria-labelledby="storyTitle">
        <div class="story-head">
          <div>
            <p>Arte para Instagram</p>
            <h2 id="storyTitle">Story</h2>
          </div>
          <button id="closeStory" class="modal-icon" type="button" title="Fechar">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="story-body">
          <canvas id="storyCanvas" width="1080" height="1920" aria-label="Prévia do story"></canvas>
        </div>
        <div class="story-actions">
          <button id="downloadStory" class="secondary-button" type="button">
            <i data-lucide="download"></i>
            <span>Baixar PNG</span>
          </button>
          <button id="shareStory" class="secondary-button primary-share" type="button">
            <i data-lucide="share-2"></i>
            <span>Compartilhar</span>
          </button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="data/schedule-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
