<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JCM | Ficha de Cobertura</title>
    <script>
      if (location.hostname === "jcm.lotusformaturas.com") {
        location.replace("/chaveamento");
      }
    </script>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-content">
        <div class="lotus-mark" aria-label="Lotus Formaturas">
          <img src="lotus-logo.png" alt="Lotus Formaturas" onerror="this.parentElement.remove()">
        </div>
        <div class="brand">
          <div class="brand-mark">
            <span>JCM</span>
            <img src="jcm-logo.png" alt="JCM" onload="this.previousElementSibling.hidden = true" onerror="this.remove()">
          </div>
          <div>
            <p>Central de cobertura</p>
            <h1>Jogos Capixaba de Medicina</h1>
          </div>
        </div>
        <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1bCQtDZ-3QunThSAsmB2Tn3WIqjYycgneT0B8PhxnE78/edit" target="_blank" rel="noreferrer">
          <i data-lucide="table-2"></i>
          <span>Planilha base</span>
        </a>
        <div id="syncStatus" class="sync-status">Conectando...</div>
      </div>
    </header>

    <main class="app-shell">
      <section class="view-tabs" aria-label="Alternar painel">
        <button class="view-tab active" type="button" data-view="coverage">
          <i data-lucide="clipboard-list"></i>
          <span>Cobertura</span>
        </button>
        <button class="view-tab" type="button" data-view="brackets">
          <i data-lucide="git-branch"></i>
          <span>Chaveamento</span>
        </button>
        <button class="view-tab" type="button" data-view="progress">
          <i data-lucide="activity"></i>
          <span>Progresso</span>
        </button>
        <button class="view-tab" type="button" data-view="upcoming">
          <i data-lucide="calendar-days"></i>
          <span>Agenda rápida</span>
        </button>
        <button class="view-tab" type="button" data-view="youtube">
          <i data-lucide="youtube"></i>
          <span>Capas YouTube</span>
        </button>
      </section>

      <section class="picker" aria-label="Selecionar partida">
        <label>
          <span>Data</span>
          <select id="dateFilter"></select>
        </label>
        <label class="wide">
          <span>Partida / evento</span>
          <select id="gamePicker"></select>
        </label>
        <div class="picker-actions" aria-label="Navegar entre partidas">
          <button id="prevGame" class="secondary-button" type="button">
            <i data-lucide="chevron-left"></i>
            <span>Anterior</span>
          </button>
          <button id="nextGame" class="secondary-button" type="button">
            <span>Próximo</span>
            <i data-lucide="chevron-right"></i>
          </button>
        </div>
      </section>

      <section id="notificationCenter" class="notification-center" aria-live="polite">
        <div class="notification-head">
          <div>
            <p>Notificações da operação</p>
            <h2>Backups e próximas ações</h2>
          </div>
          <div class="notification-actions">
            <button id="enableSound" class="secondary-button slim" type="button">
              <i data-lucide="volume-2"></i>
              <span>Ativar som</span>
            </button>
            <button id="clearNotifications" class="secondary-button slim" type="button">
              <i data-lucide="check-check"></i>
              <span>Limpar</span>
            </button>
          </div>
        </div>
        <div id="notificationList" class="notification-list"></div>
      </section>

      <section id="matchCard" class="match-card" aria-live="polite"></section>
      <section id="bracketsView" class="view-panel" hidden>
        <section class="bracket-toolbar" aria-label="Filtrar chaveamento">
          <div>
            <p>Mapa dos mata-matas</p>
            <h2>Chaveamento automatico</h2>
          </div>
          <label>
            <span>Modalidade</span>
            <select id="bracketFilter"></select>
          </label>
        </section>

        <section id="bracketsBoard" class="brackets-board" aria-live="polite"></section>
      </section>

      <section id="progressView" class="view-panel" hidden>
        <section class="progress-toolbar" aria-label="Resumo de progresso">
          <div>
            <p>Painel geral</p>
            <h2>Progresso das partidas</h2>
          </div>
          <label>
            <span>Status</span>
            <select id="progressFilter">
              <option value="all">Todos os jogos</option>
              <option value="pending">Pendentes</option>
              <option value="active">Em cobertura</option>
              <option value="ended">Fim de jogo</option>
              <option value="finalized">Finalizadas</option>
            </select>
          </label>
        </section>

        <section id="progressBoard" class="progress-board" aria-live="polite"></section>
      </section>

      <section id="upcomingView" class="view-panel" hidden>
        <section id="upcomingPanel" class="upcoming-panel" aria-live="polite"></section>
      </section>

      <section id="youtubeView" class="view-panel" hidden>
        <section id="youtubePanel" class="youtube-panel" aria-live="polite"></section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="storyModal" class="story-modal" hidden>
      <div class="story-dialog" role="dialog" aria-modal="true" aria-labelledby="storyTitle">
        <div class="story-head">
          <div>
            <p id="storyKicker">Arte para Instagram</p>
            <h2 id="storyTitle">Story</h2>
          </div>
          <button id="closeStory" class="modal-icon" type="button" title="Fechar">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="story-body">
          <canvas id="storyCanvas" width="1080" height="1920" aria-label="Prévia do story"></canvas>
        </div>
        <div class="story-actions">
          <button id="downloadStory" class="secondary-button" type="button">
            <i data-lucide="download"></i>
            <span>Baixar PNG</span>
          </button>
          <button id="shareStory" class="secondary-button primary-share" type="button">
            <i data-lucide="share-2"></i>
            <span>Compartilhar</span>
          </button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="data/schedule-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
